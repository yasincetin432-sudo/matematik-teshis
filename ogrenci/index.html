<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#1e40af" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>Öğrenci Portalı — Matematik Analizi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
// PWA kaydı
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
<style>
  :root{--teal:#0f766e;--ink:#0f172a;--mut:#64748b}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:#f8fafc;color:var(--ink)}
  .wrap{max-width:820px;margin:0 auto;padding:16px}
  header{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:5}
  .hd{max-width:820px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:10px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:18px;margin:14px 0}
  h1{font-size:17px;margin:0}
  .sub{font-size:12px;color:var(--mut)}
  label{font-size:13px;color:var(--mut);display:block;margin:10px 0 4px}
  input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:15px}
  button{background:var(--teal);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-size:15px;font-weight:600;cursor:pointer}
  button.ghost{background:#f1f5f9;color:#334155}
  .tabs{display:flex;gap:6px;margin:8px 0 4px}
  .tab{padding:8px 14px;border-radius:10px;background:#eef2f6;color:#475569;cursor:pointer;font-size:14px;font-weight:600}
  .tab.on{background:var(--teal);color:#fff}
  .row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
  .bar{flex:0 0 120px;height:8px;border-radius:99px;background:#eef2f6;overflow:hidden}
  .bar>span{display:block;height:100%}
  .pct{font-variant-numeric:tabular-nums;font-weight:700;width:46px;text-align:right}
  .grp{font-size:12px;color:var(--teal);font-weight:700;margin:12px 0 2px}
  .q{border-bottom:1px solid #eef2f6;padding:12px 0}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:2px 16px;margin-top:6px;font-size:14px;color:#334155}
  .err{color:#e11d48;font-size:13px;margin-top:8px}
  .muted{color:var(--mut);font-size:14px}
  .hide{display:none}
</style>
</head>
<body>
<header><div class="hd"><div class="logo">π</div>
  <div><h1>Öğrenci Portalı</h1><div class="sub">Matematik analizi ve tekrar kitapçığı</div></div>
  <button id="logout" class="ghost hide" style="margin-left:auto;padding:6px 12px;font-size:13px">Çıkış</button>
</div></header>

<div class="wrap">
  <!-- GİRİŞ -->
  <div id="login" class="card">
    <h1 style="margin-bottom:6px">Giriş</h1>
    <p class="sub">Öğretmeninin verdiği <b>kod</b> ve <b>şifre</b> ile giriş yap.</p>
    <label>Kod</label><input id="kod" autocomplete="username" placeholder="ör. elif2026" />
    <label>Şifre</label><input id="sifre" type="password" autocomplete="current-password" />
    <div style="margin-top:14px"><button id="giris">Giriş yap</button></div>
    <div id="loginErr" class="err"></div>
  </div>

  <!-- PANO -->
  <div id="app" class="hide">
    <div class="card" style="display:flex;align-items:center;gap:12px">
      <div><div class="sub">Hoş geldin</div><div id="ad" style="font-size:18px;font-weight:700"></div></div>
    </div>
    <div class="tabs">
      <div class="tab on" data-t="analiz">Analizim</div>
      <div class="tab" data-t="kitapcik">Kitapçığım</div>
    </div>
    <div id="analiz"></div>
    <div id="kitapcik" class="hide"></div>
  </div>
</div>

<script>
// ---- YAPILANDIRMA: kendi Supabase bilgilerinle doldur ----
const SUPABASE_URL = localStorage.getItem("sb_url") || "";
const SUPABASE_ANON_KEY = localStorage.getItem("sb_key") || "";
if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
  document.body.innerHTML = '<div style="max-width:470px;margin:50px auto;font-family:system-ui;padding:22px;background:#fff;border:1px solid #e2e8f0;border-radius:14px">'
   + '<h2 style="margin-top:0">İlk kurulum</h2>'
   + '<p style="color:#64748b;font-size:14px">Supabase panosunda <b>Project Settings → API</b> sayfasındaki iki değeri yapıştır. Bu bir kez yapılır ve bu cihazda saklanır.</p>'
   + '<label style="font-size:13px;color:#64748b">Project URL</label>'
   + '<input id="cf-url" style="width:100%;padding:9px;margin:4px 0 10px;border:1px solid #cbd5e1;border-radius:8px" placeholder="https://xxxx.supabase.co"/>'
   + '<label style="font-size:13px;color:#64748b">anon public key</label>'
   + '<input id="cf-key" style="width:100%;padding:9px;margin:4px 0 14px;border:1px solid #cbd5e1;border-radius:8px"/>'
   + '<button id="cf-save" style="padding:10px 16px;background:#0f766e;color:#fff;border:0;border-radius:9px;font-weight:600;cursor:pointer">Kaydet ve başlat</button></div>';
  document.getElementById("cf-save").onclick = function(){
    var u = document.getElementById("cf-url").value.trim().replace(/\/+$/,"");
    var k = document.getElementById("cf-key").value.trim();
    if (u.indexOf("https://") !== 0) { alert("Project URL https:// ile başlamalı."); return; }
    if (k.length < 20) { alert("anon/publishable anahtarı eksik görünüyor."); return; }
    localStorage.setItem("sb_url", u); localStorage.setItem("sb_key", k); location.reload();
  };
  throw new Error("config-needed");
}
const EMAIL_DOMAIN = "ogrenci.local";
// ----------------------------------------------------------

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = (id) => document.getElementById(id);
const sevColor = (s) => s < 0.40 ? "#f43f5e" : s < 0.65 ? "#f59e0b" : "#10b981";

async function girisYap() {
  $("loginErr").textContent = "";
  const kod = $("kod").value.trim().toLowerCase();
  const sifre = $("sifre").value;
  if (!kod || !sifre) { $("loginErr").textContent = "Kod ve şifre gerekli."; return; }
  const { error } = await sb.auth.signInWithPassword({ email: `${kod}@${EMAIL_DOMAIN}`, password: sifre });
  if (error) { $("loginErr").textContent = "Giriş başarısız. Kod/şifre hatalı olabilir."; return; }
  await yukle();
}

async function yukle() {
  const { data: prof } = await sb.rpc("get_my_profile");
  if (prof?.role && prof.role !== "ogrenci") {
    $("loginErr").textContent = "Bu portal öğrenci girişi içindir.";
    await sb.auth.signOut(); return;
  }
  $("login").classList.add("hide");
  $("app").classList.remove("hide");
  $("logout").classList.remove("hide");
  $("ad").textContent = prof?.student_name || prof?.display_name || "Öğrenci";
  cizAnaliz(await sb.rpc("get_my_diagnosis"));
  cizKitapcik(await sb.rpc("get_my_booklets"));
}

function cizAnaliz({ data }) {
  const box = $("analiz");
  const konular = data?.konular || [];
  if (!konular.length) { box.innerHTML = '<div class="card muted">Henüz analiz verisi yok. Öğretmenin deneme sonuçlarını girince burada görünecek.</div>'; return; }
  // bölüm + gruba göre grupla
  const secs = ["TYT", "AYT"];
  let html = "";
  for (const sec of secs) {
    const list = konular.filter(k => k.section === sec);
    if (!list.length) continue;
    html += `<div class="card"><h1 style="font-size:15px;margin:0 0 4px">${sec} Matematik</h1>`;
    let grp = null;
    for (const k of list.sort((a,b)=> (a.grp||"").localeCompare(b.grp||"") || a.basari-b.basari)) {
      if (k.grp !== grp) { grp = k.grp; html += `<div class="grp">${grp||""}</div>`; }
      const s = Number(k.basari);
      html += `<div class="row"><div style="flex:1">${k.ad}</div>
        <div class="bar"><span style="width:${Math.round(s*100)}%;background:${sevColor(s)}"></span></div>
        <div class="pct" style="color:${sevColor(s)}">%${Math.round(s*100)}</div></div>`;
    }
    html += `</div>`;
  }
  box.innerHTML = html;
}

function cizKitapcik({ data }) {
  const box = $("kitapcik");
  const bs = data || [];
  if (!bs.length) { box.innerHTML = '<div class="card muted">Sana atanmış bir kitapçık yok. Öğretmenin oluşturunca burada görünecek.</div>'; return; }
  let html = "";
  for (const b of bs) {
    html += `<div class="card"><h1 style="font-size:15px;margin:0 0 2px">${b.title || "Tekrar Kitapçığı"}</h1>
      <div class="sub">${new Date(b.created_at).toLocaleDateString("tr-TR")}</div>`;
    (b.items || []).forEach((it, i) => {
      const opts = ["A","B","C","D","E"].map(L => it.secenekler?.[L] != null ? `<div><b>${L})</b> ${it.secenekler[L]}</div>` : "").join("");
      html += `<div class="q"><div>${i+1}. ${it.soru}</div><div class="opts">${opts}</div></div>`;
    });
    html += `</div>`;
  }
  box.innerHTML = html;
}

// olaylar
$("giris").onclick = girisYap;
$("sifre").addEventListener("keydown", e => { if (e.key === "Enter") girisYap(); });
$("logout").onclick = async () => { await sb.auth.signOut(); location.reload(); };
document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("on"));
  t.classList.add("on");
  const on = t.dataset.t;
  $("analiz").classList.toggle("hide", on !== "analiz");
  $("kitapcik").classList.toggle("hide", on !== "kitapcik");
});

// oturum açıksa doğrudan yükle
sb.auth.getSession().then(({ data }) => { if (data.session) yukle(); });
</script>
</body>
</html>
